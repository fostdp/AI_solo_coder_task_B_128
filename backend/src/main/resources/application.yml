server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/silkroad
    username: silkroad
    password: silkroad123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  config:
    import:
      - classpath:terrain-params.yml
      - classpath:weather-params.yml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 30s
    tags:
      application: silk-road-planner
  info:
    build:
      enabled: true
    env:
      enabled: true

info:
  app:
    name: Silk Road Route Planner
    version: 1.0.0
    description: Ancient Camel Caravan Silk Road Route Planning and Weather Risk Analysis System
